<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CMAA - Portal RH</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      background: #f4f6f9;
      color: #1f2937;
    }

    .hidden {
      display: none !important;
    }

    .container {
      width: 100%;
      min-height: 100vh;
    }

    .login-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #003b73, #0f766e);
      padding: 20px;
    }

    .card {
      background: white;
      padding: 30px;
      border-radius: 16px;
      width: 100%;
      max-width: 450px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    .logo {
      text-align: center;
      margin-bottom: 20px;
    }

    .logo h1 {
      color: #003b73;
      font-size: 28px;
      margin-bottom: 5px;
    }

    .logo p {
      color: #6b7280;
      font-size: 14px;
    }

    .form-group {
      margin-bottom: 16px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-weight: bold;
      font-size: 14px;
    }

    input,
    textarea,
    select {
      width: 100%;
      padding: 12px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      font-size: 14px;
    }

    textarea {
      min-height: 120px;
      resize: vertical;
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
      transition: 0.2s;
    }

    .btn-primary {
      background: #003b73;
      color: white;
    }

    .btn-primary:hover {
      background: #002c56;
    }

    .btn-secondary {
      background: #0f766e;
      color: white;
    }

    .btn-danger {
      background: #dc2626;
      color: white;
    }

    .dashboard {
      display: flex;
      min-height: 100vh;
    }

    .sidebar {
      width: 260px;
      background: #003b73;
      color: white;
      padding: 20px;
    }

    .sidebar h2 {
      margin-bottom: 30px;
    }

    .menu-item {
      padding: 12px;
      border-radius: 10px;
      margin-bottom: 10px;
      cursor: pointer;
      transition: 0.2s;
    }

    .menu-item:hover {
      background: rgba(255,255,255,0.1);
    }

    .main {
      flex: 1;
      padding: 30px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 25px;
    }

    .welcome {
      font-size: 18px;
      font-weight: bold;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-bottom: 25px;
    }

    .info-card {
      background: white;
      padding: 20px;
      border-radius: 16px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.05);
    }

    .info-card h3 {
      margin-bottom: 10px;
      color: #003b73;
    }

    .section {
      background: white;
      padding: 25px;
      border-radius: 16px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.05);
      margin-bottom: 25px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }

    table th,
    table td {
      padding: 14px;
      border-bottom: 1px solid #e5e7eb;
      text-align: left;
      font-size: 14px;
    }

    table th {
      background: #f3f4f6;
    }

    .status {
      padding: 6px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: bold;
      display: inline-block;
    }

    .aberto {
      background: #fef3c7;
      color: #92400e;
    }

    .andamento {
      background: #dbeafe;
      color: #1d4ed8;
    }

    .finalizado {
      background: #dcfce7;
      color: #166534;
    }

    .message {
      margin-top: 15px;
      padding: 12px;
      border-radius: 10px;
      font-size: 14px;
    }

    .success {
      background: #dcfce7;
      color: #166534;
    }

    .error {
      background: #fee2e2;
      color: #991b1b;
    }

    @media (max-width: 900px) {
      .dashboard {
        flex-direction: column;
      }

      .sidebar {
        width: 100%;
      }
    }
  </style>
</head>
<body>

  <div id="loginScreen" class="login-screen">
    <div class="card">
      <div class="logo">
        <h1>CMAA RH</h1>
        <p>Portal de Chamados RH</p>
      </div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="seuemail@cmaa.com.br" />
      </div>

      <div class="form-group">
        <label>Senha</label>
        <input type="password" id="password" placeholder="********" />
      </div>

      <button class="btn-primary" onclick="login()">
        Entrar
      </button>

      <div style="height: 10px"></div>

      <button class="btn-secondary" onclick="register()">
        Criar Conta
      </button>

      <div id="authMessage"></div>
    </div>
  </div>

  <div id="dashboard" class="dashboard hidden">

    <div class="sidebar">
      <h2>CMAA RH</h2>

      <div class="menu-item" onclick="showSection('homeSection')">
        Dashboard
      </div>

      <div class="menu-item" onclick="showSection('newTicketSection')">
        Novo Chamado
      </div>

      <div class="menu-item" onclick="showSection('ticketsSection')">
        Meus Chamados
      </div>

      <div class="menu-item" onclick="logout()">
        Sair
      </div>
    </div>

    <div class="main">

      <div class="topbar">
        <div class="welcome" id="welcomeText">
          Bem-vindo
        </div>
      </div>

      <div id="homeSection">

        <div class="grid">

          <div class="info-card">
            <h3>Total de Chamados</h3>
            <p id="totalChamados">0</p>
          </div>

          <div class="info-card">
            <h3>Em Aberto</h3>
            <p id="abertos">0</p>
          </div>

          <div class="info-card">
            <h3>Em Andamento</h3>
            <p id="andamento">0</p>
          </div>

          <div class="info-card">
            <h3>Finalizados</h3>
            <p id="finalizados">0</p>
          </div>

        </div>

      </div>

      <div id="newTicketSection" class="section hidden">
        <h2>Abrir Novo Chamado</h2>

        <div class="form-group">
          <label>Tipo de Solicitação</label>
          <select id="tipo">
            <option>Férias</option>
            <option>Ajuste de Ponto</option>
            <option>Banco de Horas</option>
            <option>Atualização Documental</option>
            <option>Informações RH</option>
            <option>Benefícios</option>
            <option>Outros</option>
          </select>
        </div>

        <div class="form-group">
          <label>Unidade</label>
          <input type="text" id="unidade" placeholder="Ex: Uberlândia" />
        </div>

        <div class="form-group">
          <label>Descrição</label>
          <textarea id="descricao" placeholder="Descreva a solicitação..."></textarea>
        </div>

        <button class="btn-primary" onclick="createTicket()">
          Enviar Chamado
        </button>

        <div id="ticketMessage"></div>
      </div>

      <div id="ticketsSection" class="section hidden">
        <h2>Meus Chamados</h2>

        <table>
          <thead>
            <tr>
              <th>Tipo</th>
              <th>Unidade</th>
              <th>Status</th>
              <th>Data</th>
            </tr>
          </thead>

          <tbody id="ticketsTable"></tbody>
        </table>
      </div>

    </div>

  </div>

  <script>

    // ================================
    // CONFIGURAÇÃO SUPABASE
    // ================================

    // COLE AQUI SUA URL E SUA ANON KEY
    // ESSA CHAVE É SEGURA PARA FRONTEND

    const SUPABASE_URL = 'https://lffdopfncrozebdlvord.supabase.co'
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxmZmRvcGZuY3JvemViZGx2b3JkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk1NjA5MTIsImV4cCI6MjA5NTEzNjkxMn0.eRudn0wdM12MyKSFLMOVMeeLhRBZQ-fp0sw958_Y48Q'

    const client = supabase.createClient(
      SUPABASE_URL,
      SUPABASE_ANON_KEY
    )

    // ================================
    // LOGIN
    // ================================

    async function login() {

      const email = document.getElementById('email').value
      const password = document.getElementById('password').value

      const { data, error } = await client.auth.signInWithPassword({
        email,
        password
      })

      if (error) {
        showAuthMessage(error.message, 'error')
        return
      }

      loadDashboard(data.user)
    }

    // ================================
    // REGISTRO
    // ================================

    async function register() {

      const email = document.getElementById('email').value
      const password = document.getElementById('password').value

      const { error } = await client.auth.signUp({
        email,
        password
      })

      if (error) {
        showAuthMessage(error.message, 'error')
        return
      }

      showAuthMessage(
        'Conta criada com sucesso. Verifique seu email.',
        'success'
      )
    }

    // ================================
    // LOGOUT
    // ================================

    async function logout() {
      await client.auth.signOut()
      location.reload()
    }

    // ================================
    // DASHBOARD
    // ================================

    async function loadDashboard(user) {

      document.getElementById('loginScreen').classList.add('hidden')
      document.getElementById('dashboard').classList.remove('hidden')

      document.getElementById('welcomeText').innerText =
        `Bem-vindo, ${user.email}`

      await loadTickets()
    }

    // ================================
    // CRIAR CHAMADO
    // ================================

    async function createTicket() {

      const {
        data: { user }
      } = await client.auth.getUser()

      const tipo = document.getElementById('tipo').value
      const unidade = document.getElementById('unidade').value
      const descricao = document.getElementById('descricao').value

      const { error } = await client
        .from('chamados')
        .insert([
          {
            usuario_id: user.id,
            email: user.email,
            tipo,
            unidade,
            descricao,
            status: 'Aberto'
          }
        ])

      if (error) {
        showTicketMessage(error.message, 'error')
        return
      }

      showTicketMessage('Chamado criado com sucesso.', 'success')

      document.getElementById('descricao').value = ''
      document.getElementById('unidade').value = ''

      await loadTickets()
    }

    // ================================
    // LISTAR CHAMADOS
    // ================================

    async function loadTickets() {

      const {
        data: { user }
      } = await client.auth.getUser()

      const { data, error } = await client
        .from('chamados')
        .select('*')
        .eq('usuario_id', user.id)
        .order('created_at', { ascending: false })

      if (error) {
        console.error(error)
        return
      }

      const table = document.getElementById('ticketsTable')
      table.innerHTML = ''

      let abertos = 0
      let andamento = 0
      let finalizados = 0

      data.forEach(ticket => {

        if (ticket.status === 'Aberto') abertos++
        if (ticket.status === 'Em andamento') andamento++
        if (ticket.status === 'Finalizado') finalizados++

        table.innerHTML += `
          <tr>
            <td>${ticket.tipo}</td>
            <td>${ticket.unidade}</td>
            <td>
              <span class="status ${getStatusClass(ticket.status)}">
                ${ticket.status}
              </span>
            </td>
            <td>
              ${new Date(ticket.created_at).toLocaleDateString('pt-BR')}
            </td>
          </tr>
        `
      })

      document.getElementById('totalChamados').innerText = data.length
      document.getElementById('abertos').innerText = abertos
      document.getElementById('andamento').innerText = andamento
      document.getElementById('finalizados').innerText = finalizados
    }

    // ================================
    // STATUS CSS
    // ================================

    function getStatusClass(status) {

      if (status === 'Aberto') return 'aberto'
      if (status === 'Em andamento') return 'andamento'
      if (status === 'Finalizado') return 'finalizado'

      return 'aberto'
    }

    // ================================
    // TROCAR TELAS
    // ================================

    function showSection(sectionId) {

      const sections = [
        'homeSection',
        'newTicketSection',
        'ticketsSection'
      ]

      sections.forEach(section => {
        document.getElementById(section).classList.add('hidden')
      })

      document.getElementById(sectionId).classList.remove('hidden')
    }

    // ================================
    // MENSAGENS
    // ================================

    function showAuthMessage(message, type) {

      const div = document.getElementById('authMessage')

      div.innerHTML = `
        <div class="message ${type}">
          ${message}
        </div>
      `
    }

    function showTicketMessage(message, type) {

      const div = document.getElementById('ticketMessage')

      div.innerHTML = `
        <div class="message ${type}">
          ${message}
        </div>
      `
    }

    // ================================
    // SESSÃO AUTOMÁTICA
    // ================================

    async function checkUser() {

      const {
        data: { session }
      } = await client.auth.getSession()

      if (session?.user) {
        loadDashboard(session.user)
      }
    }

    checkUser()

  </script>

</body>
</html>
